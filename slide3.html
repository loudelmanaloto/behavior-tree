<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Finite State Machines (FSM) Recap</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>

<style>
body{
margin:0;
background:#0D1117;
font-family:Inter,sans-serif;
color:#E6EDF3;
}

/* Grid Background */
.bg-grid{
position:absolute;
inset:0;
opacity:.1;
pointer-events:none;
}

/* Title */
.title-text{
font-family:Rajdhani,sans-serif;
text-transform:uppercase;
letter-spacing:1px;
}

/* Bullet marker */
.bullet-point{
position:relative;
padding-left:24px;
}

.bullet-point::before{
content:"";
position:absolute;
left:0;
top:10px;
width:8px;
height:8px;
background:#58A6FF;
transform:rotate(45deg);
box-shadow:0 0 8px rgba(88,166,255,.6);
}

/* Diagram Window */
.diagram-window{
font-family:"Roboto Mono",monospace;
background:#161B22;
border:1px solid #30363D;
border-radius:10px;
overflow:hidden;
}

/* FSM Nodes */
.fsm-node{
fill:#0D1117;
stroke-width:2;
transition:.3s;
}

.fsm-text{
font-family:Rajdhani,sans-serif;
font-weight:700;
text-anchor:middle;
dominant-baseline:middle;
fill:#E6EDF3;
letter-spacing:1px;
}

.fsm-arrow{
stroke:#8B949E;
stroke-width:2;
fill:none;
}

.fsm-label{
fill:#8B949E;
font-family:"Roboto Mono",monospace;
font-size:10px;
text-anchor:middle;
}

.node-active{
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{ filter:drop-shadow(0 0 2px currentColor);}
50%{ filter:drop-shadow(0 0 10px currentColor);}
100%{ filter:drop-shadow(0 0 2px currentColor);}
}
</style>

</head>

<body class="relative flex flex-col min-h-screen w-full overflow-x-hidden">

<!-- Background Grid -->
<svg class="bg-grid" width="100%" height="100%">
<defs>
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
<path d="M40 0 L0 0 0 40" stroke="#58A6FF" stroke-width="0.5" fill="none"/>
</pattern>
</defs>
<rect width="100%" height="100%" fill="url(#grid)"/>
</svg>

<!-- MAIN -->
<main class="relative z-10 flex flex-col lg:flex-row flex-1 p-6 lg:p-12 gap-10">

<!-- LEFT CONTENT -->
<div class="w-full lg:w-5/12 flex flex-col justify-center space-y-8">

<div>
<div class="flex items-center space-x-2 text-[#58A6FF] mb-2">
<i class="fas fa-project-diagram text-sm"></i>
<p class="font-mono text-xs lg:text-sm uppercase tracking-widest opacity-80">
Classic Architecture
</p>
</div>

<h2 class="title-text font-bold leading-tight text-white
text-3xl sm:text-4xl md:text-5xl lg:text-6xl">
Finite State<br/>
<span class="text-[#58A6FF]">Machines</span>
</h2>

<div class="h-1 w-16 bg-[#58A6FF] shadow-[0_0_10px_#58A6FF] mt-4"></div>
</div>

<!-- Bullet Points -->
<div class="space-y-5 text-sm lg:text-lg text-[#C9D1D9]">

<div class="bullet-point">
<p class="font-semibold text-white">Defined States</p>
<p class="text-xs lg:text-sm text-[#8B949E]">
Idle, Patrol, Attack — one state at a time.
</p>
</div>

<div class="bullet-point">
<p class="font-semibold text-white">Conditional Transitions</p>
<p class="text-xs lg:text-sm text-[#8B949E]">
State changes occur via triggers.
</p>
</div>

<div class="bullet-point">
<p class="font-semibold text-white">Predictable Logic</p>
<p class="text-xs lg:text-sm text-[#8B949E]">
Fast execution but not scalable for complex AI.
</p>
</div>

</div>

</div>

<!-- RIGHT VISUAL -->
<div class="w-full lg:w-7/12 flex items-center justify-center">

<div class="diagram-window w-full max-w-2xl">

<!-- Window Header -->
<div class="bg-[#0D1117] px-4 py-2 border-b border-[#30363D] flex justify-between items-center">
<div class="flex items-center space-x-2">
<div class="flex space-x-2 mr-2">
<div class="w-3 h-3 rounded-full bg-[#FF5F56]"></div>
<div class="w-3 h-3 rounded-full bg-[#FFBD2E]"></div>
<div class="w-3 h-3 rounded-full bg-[#27C93F]"></div>
</div>
<span class="text-xs text-[#8B949E] font-mono">
FSM_Visualizer
</span>
</div>

<div class="text-xs font-mono text-[#58A6FF] animate-pulse">● LIVE</div>
</div>

<!-- SVG Diagram -->
<div class="relative flex justify-center items-center p-4">

<svg viewBox="0 0 600 400" class="w-full max-w-[600px]">

<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7"
refX="28" refY="3.5" orient="auto">
<polygon points="0 0,10 3.5,0 7" fill="#8B949E"/>
</marker>
</defs>

<!-- Arrows -->
<path class="fsm-arrow" d="M140 100 Q220 50 300 80" marker-end="url(#arrowhead)"/>
<path class="fsm-arrow" d="M340 80 Q420 80 460 150" marker-end="url(#arrowhead)"/>
<path class="fsm-arrow" d="M500 150 L450 310" marker-end="url(#arrowhead)"/>
<path class="fsm-arrow" d="M450 310 L190 300" marker-end="url(#arrowhead)"/>
<path class="fsm-arrow" d="M150 300 Q100 200 100 140" marker-end="url(#arrowhead)"/>

<!-- Nodes -->
<g>
<circle class="fsm-node" cx="100" cy="100" r="35" stroke="#58A6FF"/>
<text class="fsm-text" x="100" y="100">IDLE</text>
</g>

<g>
<circle class="fsm-node node-active" cx="300" cy="80" r="35" stroke="#58A6FF"/>
<text class="fsm-text" x="300" y="80">PATROL</text>
</g>

<g>
<circle class="fsm-node" cx="500" cy="150" r="35" stroke="#FFD700"/>
<text class="fsm-text" x="500" y="150">CHASE</text>
</g>

<g>
<circle class="fsm-node" cx="450" cy="310" r="35" stroke="#FF4757"/>
<text class="fsm-text" x="450" y="310">ATTACK</text>
</g>

<g>
<circle class="fsm-node" cx="150" cy="300" r="35" stroke="#D2A8FF"/>
<text class="fsm-text" x="150" y="300">FLEE</text>
</g>

</svg>

</div>
</div>

</div>

</main>

<!-- FOOTER -->
<footer class="h-12 border-t border-[#30363D] flex justify-end items-center px-6 text-xs font-mono text-[#58A6FF] bg-[#010409]">
<a href="slide4.html" class="hover:underline">SLIDE_04</a>
</footer>

</body>
</html>
