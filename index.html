<a href="slide2.html" class="hover:underline">SLIDE_02</a>

</footer>

<script>

const chartDom=document.getElementById("tree-visual");
const myChart=echarts.init(chartDom);

const data={
name:"ROOT",
symbolSize:20,
itemStyle:{color:'#FFD700',shadowBlur:10,shadowColor:'#FFD700'},
label:{color:'#FFD700',fontWeight:'bold'},

children:[
{
name:"SELECTOR",
itemStyle:{color:'#58A6FF',shadowBlur:10,shadowColor:'#58A6FF'},

children:[
{
name:"COMBAT",
itemStyle:{color:'#FF4757',shadowBlur:8,shadowColor:'#FF4757'},
children:[
{name:"ATTACK",itemStyle:{color:'#39D353'}},
{name:"FLANK",itemStyle:{color:'#39D353'}}
]
},
{
name:"PATROL",
itemStyle:{color:'#39D353',shadowBlur:8,shadowColor:'#39D353'},
children:[
{name:"WALK",itemStyle:{color:'#8B949E'}},
{name:"WAIT",itemStyle:{color:'#8B949E'}}
]
}
]
}
]
};

function getSymbolSize(){
if(window.innerWidth<640) return 6;
if(window.innerWidth<1024) return 8;
return 10;
}

function renderChart(){

myChart.setOption({
backgroundColor:"transparent",

tooltip:{trigger:"item"},

series:[{
type:"tree",
data:[data],

top:"8%",
left:"8%",
right:"8%",
bottom:"8%",

symbol:"circle",
symbolSize:getSymbolSize(),

orient:"TB",
expandAndCollapse:false,
initialTreeDepth:3,

label:{
position:"right",
fontFamily:"Rajdhani",
fontSize:12,
distance:10
},

lineStyle:{
color:"#30363D",
width:2,
curveness:.5
},

animationDurationUpdate:750
}]
});

}

renderChart();

window.addEventListener("resize",()=>{
renderChart();
myChart.resize();
});

</script>
